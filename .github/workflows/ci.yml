name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.8", "3.9", "3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint with ruff
        run: ruff check nanovox/ || true

      - name: Run tests
        run: |
          pytest tests/ -v --tb=short -x

      - name: Check model param counts
        run: |
          python -c "
          from nanovox.model import build_nano_model, build_small_model
          from nanovox.vocoder import build_vocoder
          from nanovox.config import NANO_CONFIG, SMALL_CONFIG

          nm = build_nano_model()
          nv = build_vocoder(NANO_CONFIG.vocoder)
          nano_total = nm.count_parameters() + nv.count_parameters()

          sm = build_small_model()
          sv = build_vocoder(SMALL_CONFIG.vocoder)
          small_total = sm.count_parameters() + sv.count_parameters()

          print(f'Nano model:  {nano_total:,} params ({nano_total/1e6:.1f}M)')
          print(f'Small model: {small_total:,} params ({small_total/1e6:.1f}M)')

          assert 8e6 < nano_total < 25e6, f'Nano out of range: {nano_total}'
          assert 20e6 < small_total < 60e6, f'Small out of range: {small_total}'
          print('Parameter count checks passed.')
          "

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install ruff black isort
      - name: Check formatting
        run: |
          black --check nanovox/ || echo "Black formatting issues (non-blocking)"
          isort --check-only nanovox/ || echo "isort issues (non-blocking)"
          ruff check nanovox/ || echo "Ruff issues (non-blocking)"

  build:
    name: Build package
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install build twine
      - name: Build wheel and sdist
        run: python -m build
      - name: Check distribution
        run: twine check dist/*
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
